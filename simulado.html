<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulado AB‑900 – Estudo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg">
  <main class="container">
    <h1>📚 Modo Simulado</h1>
    <p class="subtitle">Responda e veja a explicação quando quiser.</p>

    <div id="questionContainer"></div>

    <div class="actions">
      <button class="ghost" type="button" onclick="showExplanation()">Ver resposta</button>
      <button class="primary" type="button" onclick="nextQuestion()">Próxima</button>
    </div>

    <div id="result" class="card hidden"></div>

    <div class="actions" style="margin-top: 18px;">
      <a class="link-btn" href="index.html">⬅️ Voltar para Home</a>
    </div>
  </main>
  <!-- Modal de Resultado (Popup) -->
<div id="resultModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitle" class="modal-title">Resultado</h2>
      <button class="modal-close" type="button" aria-label="Fechar" onclick="closeModal()">✕</button>
    </div>

    <div id="modalBody" class="modal-body">
      <!-- Conteúdo do resultado entra via JS -->
    </div>

    <div class="modal-actions">
      <a class="link-btn" href="index.html">⬅️ Voltar para Home</a>
      <button id="modalRetryBtn" class="primary" type="button" onclick="retryFromModal()">Tentar novamente</button>
    </div>
  </div>
</div>

  <footer>Desenvolvido por <strong>Fabiana Alves Chaves Ferreira</strong></footer>

  <script src="script.js"></script>
  <script>
    startStudy();
  </script>
</body>
</html>
